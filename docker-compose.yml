version: "3.9"

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  forum-api:
    build:
      context: ./forum-api
    environment:
      PORT: "3000"
    ports:
      - "3000:3000"

  userservice:
    build:
      context: ./userservice
    environment:
      PORT: "3001"
    ports:
      - "3001:3001"

  postservice:
    build:
      context: ./postservice
    environment:
      PORT: "3002"
      RABBITMQ_URL: "amqp://rabbitmq:5672"
      POSTS_QUEUE: "posts.events"
      POSTS_QUEUE_STATS: "posts.events.stats"
      POSTS_QUEUE_AI: "posts.events.ai"
      AUTH_SERVICE_URL: "http://authservice:3004"
    ports:
      - "3002:3002"
    depends_on:
      rabbitmq:
        condition: service_healthy

  topicservice:
    build:
      context: ./topicservice
    environment:
      PORT: "3003"
    ports:
      - "3003:3003"

  authservice:
    build:
      context: ./authservice
    environment:
      PORT: "3004"
    ports:
      - "3004:3004"

  stats-worker:
    build:
      context: ./stats-worker
    environment:
      RABBITMQ_URL: "amqp://rabbitmq:5672"
      POSTS_QUEUE: "posts.events"
      POSTS_QUEUE_STATS: "posts.events.stats"
    depends_on:
      rabbitmq:
        condition: service_healthy

  ai-processor:
    build:
      context: ./ai-processor
    environment:
      RABBITMQ_URL: "amqp://rabbitmq:5672"
      POSTS_QUEUE: "posts.events"
      POSTS_QUEUE_AI: "posts.events.ai"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      AI_FORCE_FLAG: "${AI_FORCE_FLAG}"
    depends_on:
      rabbitmq:
        condition: service_healthy
